title: Comprehensive Review
description: "Comprehensive PR/MR review using parallel specialized agents. Produces structured summaries and severity-ranked findings from 10+ agents."
theme: just-the-docs

url: "https://tag1consulting.github.io"
baseurl: "/claude-comprehensive-review"

color_scheme: tag1

logo: "/assets/images/tag1-logo.svg"
favicon_ico: "/assets/images/favicon.ico"

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

aux_links:
  "View on GitHub":
    - "https://github.com/tag1consulting/claude-comprehensive-review"
aux_links_new_tab: true

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/tag1consulting/claude-comprehensive-review"
gh_edit_source: docs
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

exclude:
  - Gemfile.lock
  - node_modules
  - vendor
